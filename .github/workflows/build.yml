name: Build Libdispatch with MSYS2 (POSIX Environment)

on:
  workflow_dispatch:

jobs:
  build-windows-msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup MSYS2 (MSYS Mode)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MSYS  # 核心：使用 MSYS 模式，走 POSIX 兼容层，不走 MINGW64
        update: true
        install: >-
          git
          make
          cmake
          gcc
          clang
          ninja

    - name: Configure and Build
      run: |
        mkdir build && cd build
        
        # 既然是纯粹的类 Linux 环境，我们甚至不需要用 -D 去抹掉宏，让它走普通的静态编译即可
        cmake -G "Ninja" \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/dispatch_msys_dist" \
          ..
        
        ninja
        cmake --install .

    - name: Upload Prebuilt Libdispatch
      uses: actions/upload-artifact@v4
      with:
        name: apple-libdispatch-msys2-static
        path: ${{ github.workspace }}/dispatch_msys_dist/
