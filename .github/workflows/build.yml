name: Build

on:
  workflow_dispatch:

jobs:
  build-windows-msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup MSYS2 (MSYS Mode)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MSYS
        update: true
        install: >-
          git
          make
          cmake
          clang
          ninja

    - name: Configure and Build
      run: |
        mkdir build && cd build
        
        # 核心：显式指定使用 Clang 编译器，拒绝让 CMake 默认去抓普通的 GCC (cc)
        cmake -G "Ninja" \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DCMAKE_C_COMPILER=/usr/bin/clang \
          -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/dispatch_msys_dist" \
          ..
        
        ninja
        cmake --install .

    - name: Upload Prebuilt Libdispatch
      uses: actions/upload-artifact@v4
      with:
        name: apple-libdispatch-msys2-static
        path: ${{ github.workspace }}/dispatch_msys_dist/
